<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>RPG Naruto Online - Portal de Gestão NTEi</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --naruto-orange: #ff6600; }
        body { background-color: #000; color: #ddd; font-family: 'Nunito', sans-serif; }
        .navbar-ntei { background-color: rgba(0,0,0,0.9) !important; border-bottom: 3px solid var(--naruto-orange); padding: 15px 0; }
        .nav-link { font-weight: 700; color: #fff !important; text-transform: uppercase; margin: 0 10px; }
        .nav-link:hover, .nav-link.active { color: var(--naruto-orange) !important; }
        .hero-header { background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.alphacoders.com/161/161471.jpg'); background-size: cover; min-height: 50vh; display: flex; align-items: center; text-align: center; }
        .service-box { text-align: center; margin-bottom: 30px; text-decoration: none; display: block; }
        .service-circle { width: 80px; height: 80px; background: #111; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 30px; color: var(--naruto-orange); transition: 0.3s; }
        .service-box:hover .service-circle { background: var(--naruto-orange); color: #000; transform: translateY(-5px); }
        .service-box p { color: #fff; font-weight: 800; font-size: 0.75rem; }
        footer { background: #080a11; padding: 50px 0; border-top: 5px solid var(--naruto-orange); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-ntei sticky-top">
    <div class="container">
        <a href="index.html" class="navbar-brand"><h2 class="m-0 text-white">NTEi<span style="color:var(--naruto-orange)"> SHINOBI</span></h2></a>
        <div class="navbar-nav ms-auto">
            <a href="index.html" class="nav-item nav-link">Início</a>
            <a href="sede.html" class="nav-item nav-link">Sede</a>
            <a href="portal.html" class="nav-item nav-link active">Portal</a>
        </div>
    </div>
</nav>
<div class="hero-header">
    <div class="container">
        <h1 class="display-4 fw-bold text-white mb-4" style="font-family:'Oswald';">PORTAL DE GESTÃO</h1>
        <p class="text-warning">Acesse os sistemas das Vilas Ocultas</p>
    </div>
</div>
<div class="container mt-4">
    <div class="row g-4 justify-content-center">
        <div class="col-4 col-md-2"><a href="#" class="service-box"><div class="service-circle"><i class="fa fa-leaf"></i></div><p>KONOHA</p></a></div>
        <div class="col-4 col-md-2"><a href="#" class="service-box"><div class="service-circle"><i class="fa fa-sun"></i></div><p>SUNA</p></a></div>
        <div class="col-4 col-md-2"><a href="#" class="service-box"><div class="service-circle"><i class="fa fa-bolt"></i></div><p>KUMO</p></a></div>
        <div class="col-4 col-md-2"><a href="#" class="service-box"><div class="service-circle"><i class="fa fa-water"></i></div><p>KIRI</p></a></div>
    </div>
</div>
<footer>
    <div class="container text-center">
        <p>© 2026 Plataforma Shinobi - Desenvolvido por NTi Nuvem</p>
        <a href="index.html" class="btn btn-outline-warning btn-sm">Voltar ao Início</a>
    </div>
</footer>
</body>
</html>
