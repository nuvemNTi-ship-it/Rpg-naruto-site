<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>NTEi - Portal de Gestão</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --orange: #ff6600; }
        body { background: #000; color: #fff; font-family: 'Nunito', sans-serif; }
        .navbar-portal { background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--orange); padding: 15px 0; }
        .hero-portal { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.alphacoders.com/161/161471.jpg'); background-size: cover; padding: 60px 0; text-align: center; }
        .vila-box { text-align: center; text-decoration: none; color: #fff; display: block; padding: 20px; transition: 0.3s; }
        .vila-circle { width: 100px; height: 100px; background: #111; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 40px; color: var(--orange); }
        .vila-box:hover .vila-circle { background: var(--orange); color: #000; transform: scale(1.1); }
        .vila-box p { font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-portal">
        <div class="container justify-content-center">
            <a href="index.html" class="nav-link px-3 text-white">INÍCIO</a>
            <a href="sede.html" class="nav-link px-3 text-white">SEDE</a>
            <a href="portal.html" class="nav-link px-3 text-warning fw-bold">PORTAL</a>
        </div>
    </nav>
    <div class="hero-portal">
        <h1 style="font-family:'Oswald';">O QUE VOCÊ PROCURA?</h1>
        <p class="text-white-50">Selecione o acesso à sua Vila Oculta</p>
    </div>
    <div class="container py-5">
        <div class="row g-4 justify-content-center">
            <div class="col-6 col-md-2"><a href="#" class="vila-box"><div class="vila-circle"><i class="fa fa-leaf"></i></div><p>KONOHA</p></a></div>
            <div class="col-6 col-md-2"><a href="#" class="vila-box"><div class="vila-circle"><i class="fa fa-sun"></i></div><p>SUNA</p></a></div>
            <div class="col-6 col-md-2"><a href="#" class="vila-box"><div class="vila-circle"><i class="fa fa-bolt"></i></div><p>KUMO</p></a></div>
            <div class="col-6 col-md-2"><a href="#" class="vila-box"><div class="vila-circle"><i class="fa fa-water"></i></div><p>KIRI</p></a></div>
        </div>
    </div>
    <footer class="text-center py-4 text-white-50 border-top border-secondary">
        Desenvolvido por Nuvem Shinobi © 2026
    </footer>
</body>
</html>
