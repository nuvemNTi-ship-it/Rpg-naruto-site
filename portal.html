<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Portal do Cidadão - NTEi Shinobi</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --naruto-orange: #ff6600; --naruto-dark: #1a1a1a; --gray-light: #222; }
        body { background-color: #000; color: #ddd; font-family: 'Nunito', sans-serif; }
        .top-admin-bar { background: #111; color: #888; padding: 5px 0; font-size: 11px; border-bottom: 1px solid #333; }
        .top-admin-bar a { color: #888; text-decoration: none; margin-left: 15px; transition: 0.3s; }
        .top-admin-bar a:hover { color: var(--naruto-orange); }
        .navbar-ntei { background-color: rgba(0,0,0,0.9) !important; border-bottom: 3px solid var(--naruto-orange); padding: 15px 0; }
        .nav-link { font-weight: 700; text-transform: uppercase; color: #fff !important; margin: 0 10px; }
        .nav-link:hover, .nav-link.active { color: var(--naruto-orange) !important; }
        .hero-header { background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.alphacoders.com/161/161471.jpg'); background-size: cover; background-position: center top -20px; min-height: 60vh; display: flex; align-items: center; text-align: center; }
        .search-main { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 2px solid var(--naruto-orange); border-radius: 50px; padding: 10px; max-width: 800px; margin: 0 auto 40px; display: flex; }
        .search-main input { background: transparent; border: none; color: white; padding-left: 20px; flex-grow: 1; outline: none; font-size: 1.1rem; }
        .service-box { text-align: center; margin-bottom: 30px; text-decoration: none; display: block; }
        .service-circle { width: 100px; height: 100px; background: #111; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 35px; color: var(--naruto-orange); transition: 0.3s; }
        .service-box:hover .service-circle { background: var(--naruto-orange); color: #000; transform: translateY(-10px); }
        .service-box p { color: #fff; font-weight: 800; font-size: 0.85rem; }
        .section-title { font-family: 'Oswald'; border-left: 5px solid var(--naruto-orange); padding-left: 15px; margin-bottom: 30px; }
        .card-news { background: #111; border: 1px solid #222; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .ntei-footer { background: #080a11; padding: 80px 0 30px; border-top: 5px solid var(--naruto-orange); }
    </style>
</head>
<body>

<div class="top-admin-bar">
    <div class="container d-flex justify-content-between">
        <div><i class="fa fa-microchip me-2"></i> Núcleo de Tecnologia e Inovação - NTEi</div>
        <div>
            <a href="#">Portal da Transparência</a>
            <a href="index.html">Voltar ao Gabinete</a>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-ntei sticky-top">
    <div class="container">
        <a href="index.html" class="navbar-brand"><h2 class="m-0 text-white">NTEi<span style="color:var(--naruto-orange)"> SHINOBI</span></h2></a>
        <div class="navbar-nav ms-auto">
            <a href="index.html" class="nav-item nav-link">Gabinete Central</a>
            <a href="portal.html" class="nav-item nav-link active">Cidadão Ninja</a>
            <a href="sede.html" class="nav-item nav-link">Servidores</a>
            <a href="#" class="nav-item nav-link text-warning">Entrar no RPG</a>
        </div>
    </div>
</nav>

<div class="hero-header">
    <div class="container">
        <h1 class="display-3 fw-bold text-white mb-4" style="font-family:'Oswald';">O QUE VOCÊ PROCURA?</h1>
        <div class="search-main">
            <input type="text" placeholder="Pesquisar Jutsus, Exames ou Clãs...">
            <button class="btn btn-warning rounded-pill px-5 fw-bold"><i class="fa fa-search me-2"></i> BUSCAR</button>
        </div>
    </div>
</div>

<footer class="ntei-footer">
    <div class="container text-center text-secondary">
        <p>© 2026 <b>Nuvem (NTEi)</b> - Portal do Cidadão</p>
    </div>
</footer>

</body>
</html>
