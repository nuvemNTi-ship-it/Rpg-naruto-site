<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>NTEi - Sede Administrativa Shinobi</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --orange: #ff6600; --dark-bg: #000000; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Nunito', sans-serif; margin: 0; }
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.95)), url('https://images.alphacoders.com/161/161471.jpg'); 
            background-size: cover; background-position: center top; min-height: 85vh; display: flex; align-items: center; border-bottom: 5px solid var(--orange);
        }
        .main-title { font-family: 'Oswald', sans-serif; font-size: clamp(3rem, 10vw, 5rem); text-transform: uppercase; letter-spacing: 5px; }
        .search-container { width: 100%; max-width: 700px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 2px solid var(--orange); border-radius: 100px; padding: 8px 15px; display: flex; margin: 0 auto 50px; }
        .btn-search { background: var(--orange); color: #000; border-radius: 50px; padding: 10px 30px; font-weight: 800; border: none; }
        .service-card { background: var(--glass); border: 1px solid #222; border-radius: 15px; padding: 25px 10px; text-align: center; transition: 0.3s; text-decoration: none; display: flex; flex-direction: column; height: 100%; }
        .service-card:hover { background: var(--orange); transform: translateY(-10px); }
        .service-card i { font-size: 2.5rem; color: var(--orange); margin-bottom: 10px; }
        .service-card h5 { font-size: 0.85rem; color: #fff; font-weight: 800; margin: 0; }
        .service-card:hover i, .service-card:hover h5 { color: #000 !important; }
        footer { background: #000; border-top: 5px solid var(--orange); padding: 60px 0 30px; }
        footer a { color: #888; text-decoration: none; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="hero-section">
    <div class="container text-center">
        <a href="index.html" style="text-decoration:none; color:inherit;"><h1 class="main-title">NTEi <span style="color:var(--orange)">SHINOBI</span></h1></a>
        <p class="subtitle text-warning fw-bold mb-4">Sede Administrativa Central - 2026</p>
        <div class="row g-3 justify-content-center mb-5">
            <div class="col-md-2"><a href="index.html" class="service-card"><i class="fa fa-home"></i><h5>INÍCIO</h5></a></div>
            <div class="col-md-2"><a href="portal.html" class="service-card"><i class="fa fa-id-card"></i><h5>PORTAL</h5></a></div>
            <div class="col-md-2"><a href="#" class="service-card"><i class="fa fa-file-invoice"></i><h5>EDITAIS</h5></a></div>
        </div>
        <form class="search-container">
            <input type="text" class="form-control bg-transparent border-0 text-white" placeholder="Pesquisar editais...">
            <button class="btn-search">BUSCAR</button>
        </form>
    </div>
</div>
<footer>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <h5 class="text-warning">Navegação</h5>
                <a href="index.html">Página Inicial</a>
                <a href="portal.html">Portal de Gestão</a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
